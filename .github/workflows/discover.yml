name: Daily Tool Discovery

on:
  schedule:
    - cron: '0 8 * * *'  # 每天 UTC 08:00 (北京 16:00)
  workflow_dispatch:       # 手动触发

permissions:
  contents: write          # 允许 commit + push

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pyyaml

      - name: Run discovery pipeline
        run: python run_pipeline.py "bioinformatics protein engineering tools" 5

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github_from_html.json tool_library.json tool_library_clean.json discovered_registry.yaml seen_papers.json data/mcp_registry.yaml || true
          git diff --cached --quiet || git commit -m "auto: daily tool discovery $(date -u +%Y-%m-%d)"
          git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
